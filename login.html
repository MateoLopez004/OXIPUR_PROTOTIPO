<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oxipur - Iniciar Sesión</title>
  
  <!-- Fonts and icons -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style href="/css/style.css"></style>
  <!-- Estilos compartidos -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="resources/oxipur.png">
</head>
<body class="login-page">
  <!-- Particles container (se llena con JS) -->
  <div class="particles-container" id="particles"></div>
  
  <!-- Formas decorativas -->
  <div class="shape shape-1"></div>
  <div class="shape shape-2"></div>
  <div class="shape shape-3"></div>
  
  <!-- Login card -->
  <div class="login-wrapper">
    <div class="login-card">
      <div class="logo-container">
        <div class="logo-icon">
          <i class="fas fa-flask"></i>
        </div>
        <h1>OXIPUR</h1>
        <p class="subtitle">Sistema de Gestión de Inventario</p>
      </div>
      
      <form id="login-form">
        <div class="form-group">
          <label for="username">
            <i class="fas fa-user"></i>
            Usuario
          </label>
          <input type="text" id="username" class="form-input" placeholder="Ingrese su usuario" required>
        </div>
        
        <div class="form-group">
          <label for="password">
            <i class="fas fa-lock"></i>
            Contraseña
          </label>
          <input type="password" id="password" class="form-input" placeholder="Ingrese su contraseña" required>
          <i class="fas fa-eye toggle-password" id="togglePassword"></i>
        </div>
        
        <button type="submit" class="btn-login">
          <i class="fas fa-sign-in-alt mr-2"></i>
          Iniciar Sesión
          <i class="fas fa-arrow-right ml-2"></i>
        </button>
      </form>
      
      <div class="login-footer">
        <p>Demo Creada Por StockFlow</p>
      </div>
    </div>
  </div>

  <!-- Script solo para login (pequeño) -->
  <script>
    // Toggle password visibility
    document.getElementById('togglePassword')?.addEventListener('click', function() {
      const password = document.getElementById('password');
      const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
      password.setAttribute('type', type);
      this.classList.toggle('fa-eye');
      this.classList.toggle('fa-eye-slash');
    });

    // Login form submit
    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();
      window.location.href = 'index.html';
    });

    // Crear partículas (pocas líneas)
    function createParticles() {
      const container = document.getElementById('particles');
      if (!container) return;
      
      for (let i = 0; i < 25; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        
        const size = Math.random() * 40 + 10;
        const left = Math.random() * 100;
        const top = Math.random() * 100;
        const delay = Math.random() * 10;
        
        particle.style.width = `${size}px`;
        particle.style.height = `${size}px`;
        particle.style.left = `${left}%`;
        particle.style.top = `${top}%`;
        particle.style.animationDelay = `${delay}s`;
        particle.style.opacity = Math.random() * 0.2 + 0.1;
        
        container.appendChild(particle);
      }
    }

    createParticles();
  </script>
</body>
</html>
